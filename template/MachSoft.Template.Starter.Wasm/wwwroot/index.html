<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MachSoft.Template.Starter.Wasm</title>
    <base href="/" />
    <script src="_content/MachSoft.Template.Core/js/theme.js"></script>
    <script>window.machsoftTheme?.init();</script>
    <link rel="stylesheet" href="_content/MachSoft.Template.Core/css/template/tokens.css" />
    <link rel="stylesheet" href="_content/MachSoft.Template.Core/css/template/base.css" />
    <link rel="stylesheet" href="_content/MachSoft.Template.Core/css/template/layout.css" />
    <link rel="stylesheet" href="_content/MachSoft.Template.Core/css/template/components.css" />
    <link rel="stylesheet" href="_content/MachSoft.Template.Core/css/template/utilities.css" />
    <style>
        #blazor-error-ui {
            display: none;
            background: #fff2f2;
            bottom: 0;
            box-shadow: 0 -1px 2px rgba(0,0,0,.12);
            box-sizing: border-box;
            color: #641b1b;
            left: 0;
            padding: 0.7rem 1.25rem;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }

        #blazor-error-ui .dismiss {
            cursor: pointer;
            position: absolute;
            right: 0.75rem;
            top: 0.45rem;
        }
    </style>
</head>
<body>
    <div id="app">Cargando MachSoft WASM...</div>
    <div id="blazor-error-ui">
        Ocurrió un error.
        <a href="" class="reload">Recargar</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
